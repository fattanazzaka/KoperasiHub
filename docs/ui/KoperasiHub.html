  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

direction:column; gap:6px; font-size:13px; font-weight:600; color:#1B1F24\">Email\n        <input type=\"email\" defaultvalue=\"juri@koperasihub.id\" style=\"height:44px; padding:0 12px; border:1px solid rgba(92,101,112,.35); border-radius:8px; font-size:15px; color:#1B1F24; background:#FFFFFF; outline:none\" style-focus=\"outline: 2px solid #C81E1E; outline-offset: 1px\">\n      <\u002Flabel>\n      <label style=\"display:flex; flex-direction:column; gap:6px; font-size:13px; font-weight:600; color:#1B1F24\">Kata sandi\n        <input type=\"password\" defaultvalue=\"demo123\" style=\"height:44px; padding:0 12px; border:1px solid rgba(92,101,112,.35); border-radius:8px; font-size:15px; color:#1B1F24; background:#FFFFFF; outline:none\" style-focus=\"outline: 2px solid #C81E1E; outline-offset: 1px\">\n      <\u002Flabel>\n      <button type=\"submit\" style=\"height:48px; border:none; border-radius:8px; background:#C81E1E; color:#FFFFFF; font-size:15px; font-weight:600; cursor:pointer; transition:background .15s\" style-hover=\"background:#8F1212\" style-focus=\"outline: 2px solid #C81E1E; outline-offset: 2px\">Masuk<\u002Fbutton>\n    <\u002Fform>\n    <div style=\"background:rgba(92,101,112,.08); border:1px solid rgba(92,101,112,.15); border-radius:8px; padding:12px 16px; font-size:13px; color:#5C6570; text-align:center\">\n      Akun uji juri: <span style=\"font-weight:600; color:#1B1F24\">juri@koperasihub.id<\u002Fspan> / <span style=\"font-weight:600; color:#1B1F24\">demo123<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ APP SHELL ============ -->\n<sc-if value=\"{{ isApp }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh; display:flex; background:#F5F6F8\">\n\n  <!-- Sidebar desktop -->\n  <sc-if value=\"{{ isDesktop }}\" hint-placeholder-val=\"{{ false }}\">\n  <nav data-noprint=\"true\" style=\"width:232px; flex:none; background:#FFFFFF; border-right:1px solid rgba(92,101,112,.15); display:fl u002Fsc-raw-th>\n          <sc-raw-th style=\"text-align:right; padding:8px 10px; border:1px solid rgba(92,101,112,.35); background:rgba(92,101,112,.07); font-weight:600\">Fee Keberhasilan (5%)<\u002Fsc-raw-th>\n        <\u002Fsc-raw-tr>\n      <\u002Fsc-raw-thead>\n      <sc-raw-tbody>\n        <sc-for list=\"{{ poRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n          <sc-raw-tr>\n            <sc-raw-td style=\"padding:8px 10px; border:1px solid rgba(92,101,112,.35); font-weight:500\">{{ r.nama }}<\u002Fsc-raw-td>\n            <sc-raw-td style=\"padding:8px 10px; border:1px solid rgba(92,101,112,.35); color:#5C6570\">{{ r.nib }}<\u002Fsc-raw-td>\n            <sc-raw-td style=\"padding:8px 10px; border:1px solid rgba(92,101,112,.35); text-align:right\">{{ r.vol }}<\u002Fsc-raw-td>\n            <sc-raw-td style=\"padding:8px 10px; border:1px solid rgba(92,101,112,.35); text-align:right\">Rp14.574<\u002Fsc-raw-td>\n            <sc-raw-td style=\"padding:8px 10px; border:1px solid rgba(92,101,112,.35); text-align:right; color:#0E7B46; font-weight:600\">{{ r.hemat }}<\u002Fsc-raw-td>\n            <sc-raw-td style=\"padding:8px 10px; border:1px solid rgba(92,101,112,.35); text-align:right\">{{ r.fee }}<\u002Fsc-raw-td>\n          <\u002Fsc-raw-tr>\n        <\u002Fsc-for>\n        <sc-raw-tr>\n          <sc-raw-td style=\"padding:8px 10px; border:1px solid rgba(92,101,112,.35); font-weight:700\" colspan=\"2\">TOTAL<\u002Fsc-raw-td>\n          <sc-raw-td style=\"padding:8px 10px; border:1px solid rgba(92,101,112,.35); text-align:right; font-weight:700\">5.050 kg<\u002Fsc-raw-td>\n          <sc-raw-td style=\"padding:8px 10px; border:1px solid rgba(92,101,112,.35); text-align:right; font-weight:700\">Rp73.598.700<\u002Fsc-raw-td>\n          <sc-raw-td style=\"padding:8px 10px; border:1px solid rgba(92,101,112,.35); text-align:right; font-weight:700; color:#0E7B46\">Rp2.825.200<\u002Fsc-raw-td>\n          <sc-raw-td style=\"padding:8px 10px; border:1px solid rgba(92,101,112,.35); text-align:right; font-weight:700\">Rp141.260<\u002Fsc-raw-td>\n        <\u002Fsc-raw-tr>\n      <\u002Fsc-raw-tbody>\n    <\u002Fsc-raw-table>\n\n    <div style=\"margin-top:20px; font-size:13px; color:#5C6570; line-height:1.6\">\n      Alokasi Proporsional dihitung dari volume kebutuhan masing-masing koperasi. Fee Keberhasilan sebesar 5% dari penghematan dipungut hanya jika Ambang Tier tercapai dan PO terlaksana.\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:40px; font-size:13px\">\n      <div>\n        <div style=\"color:#5C6570\">Diterbitkan oleh,<\u002Fdiv>\n        <div style=\"height:64px\"><\u002Fdiv>\n        <div style=\"font-weight:600; border-top:1px solid #1B1F24; padding-top:6px; display:inline-block\">Koordinator Klaster Sragen<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"color:#5C6570\">Disetujui supplier,<\u002Fdiv>\n        <div style=\"height:64px\"><\u002Fdiv>\n        <div style=\"font-weight:600; border-top:1px solid #1B1F24; padding-top:6px; display:inline-block\">Bulog Kanwil Jawa Tengah<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: {&quot;width&quot;: 420, &quot;height&quot;: 900},\n  &quot;startScreen&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;login&quot;, &quot;beranda&quot;, &quot;pool&quot;, &quot;form&quot;, &quot;alokasi&quot;, &quot;po&quot;], &quot;default&quot;: &quot;login&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Demo&quot;},\n  &quot;showDemoButton&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Demo&quot;}\n}\">\nclass Component extends DCLogic {\n  state = {\n    screen: null, isDesktop: false, menu: false,\n    role: 'butuh', sheet: false, joined: false, showPeserta: false,\n    tier: 'idle', prog: 85, hemat: 627200, vol: 4250, peserta: 12\n  };\n\n  componentDidMount() {\n    this.mq = matchMedia('(min-width:1024px)');\n    this.onMq = () => this.setState({ isDesktop: this.mq.matches });\n    this.mq.addEventListener('change', this.onMq);\n    this.onMq();\n  }\n  componentWillUnmount() { if (this.mq) this.mq.removeEventListener('change', this.onMq); }\n\n  go(scr) { this.setState({ screen: scr, menu: false }); window.scrollTo(0, 0); }\n\n  triggerTier() {\n    if (this.state.tier !== 'idle') return;\n    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;\n    this.setState({ vol: 5050, peserta: 13, joined: true });\n    if (reduce) { this.setState({ tier: 'done', prog: 100, hemat: 627200 }); return; }\n    this.setState({ tier: 'filling', prog: 100, hemat: 0 });\n    setTimeout(() => {\n      this.setState({ tier: 'filled' });\n      const t0 = performance.now();\n      const step = (t) => {\n        const p = Math.min(1, (t - t0) / 800);\n        const e = 1 - Math.pow(1 - p, 3);\n        if (p < 1) { this.setState({ hemat: Math.round(627200 * e) }); requestAnimationFrame(step); }\n        else this.setState({ tier: 'done', hemat: 627200 });\n      };\n      requestAnimationFrame(step);\n    }, 430);\n  }\n\n  renderVals() {\n    const s = this.state;\n    const scr = s.screen || (this.props.startScreen || 'login');\n    const showDemoBtn = this.props.showDemoButton !== undefined ? this.props.showDemoButton : true;\n    const fmt = (n) => 'Rp' + n.toLocaleString('id-ID');\n    const num = (n) => n.toLocaleString('id-ID');\n    const filled = s.tier === 'filled' || s.tier === 'done';\n    const done = s.tier === 'done';\n    const isApp = ['beranda', 'pool', 'form', 'alokasi'].indexOf(scr) >= 0;\n    const navCol = (k) => (scr === k ? '#C81E1E' : '#5C6570');\n    const navBg = (k) => (scr === k ? 'rgba(200,30,30,.08)' : 'transparent');\n    const titles = { pool: 'Detail Pool', form: 'Ajukan Kebutuhan', alokasi: 'Alokasi Saya' };\n\n    return {\n      // routing\n      isLogin: scr === 'login', isApp, isDoc: scr === 'po',\n      isBeranda: scr === 'beranda', notBeranda: isApp && scr !== 'beranda',\n      isPool: scr === 'pool', isForm: scr === 'form', isAlokasi: scr === 'alokasi',\n      showBack: scr === 'pool',\n      headerTitle: titles[scr] || '',\n      isDesktop: s.isDesktop, isMobile: !s.isDesktop,\n      doLogin: (e) => { if (e && e.preventDefault) e.preventDefault(); this.go('beranda'); },\n      doLogout: () => { this.go('login'); },\n      goBeranda: () => this.go('beranda'),\n      goPool: () => this.go('pool'),\n      goForm: () => this.go('form'),\n      goAlokasi: () => this.go('alokasi'),\n      goDoc: () => this.go('po'),\n      toggleMenu: () => this.setState({ menu: !s.menu }),\n      menuOpen: s.menu,\n      // nav colors\n      navBeranda: navCol('beranda'), navPool: navCol('pool'), navForm: navCol('form'), navPO: navCol('alokasi'),\n      navBgBeranda: navBg('beranda'), navBgPool: navBg('pool'), navBgForm: navBg('form'), navBgPO: navBg('alokasi'),\n      // pool data\n      progPct: s.prog + '%',\n      volText: num(s.vol) + ' / 5.000 kg',\n      posText: num(s.vol),\n      pesertaText: String(s.peserta),\n      kurangText: filled ? 'Ambang Tier Grosir tercapai' : 'Kurang ' + num(5000 - s.vol) + ' kg lagi menuju harga grosir',\n      tierBg: filled ? '#C81E1E' : '#FFFFFF',\n      tierFg: filled ? '#FFFFFF' : '#1B1F24',\n      tierMuted: filled ? 'rgba(255,255,255,.78)' : '#5C6570',\n      tierFilled: filled, tierNotFilled: !filled,\n      tierDone: done, tierNotDone: !done,\n      hematLabel: done ? 'Hemat Anda — Tier Grosir tercapai' : 'Estimasi hemat Anda di tier ini',\n      hematText: fmt(s.tier === 'idle' ? 627200 : s.hemat),\n      showDemo: showDemoBtn && s.tier === 'idle',\n      triggerDemo: () => this.triggerTier(),\n      joined: s.joined, notJoined: !s.joined,\n      togglePeserta: () => this.setState({ showPeserta: !s.showPeserta }),\n      showPeserta: s.showPeserta,\n      pesertaBtnText: (s.showPeserta ? 'Sembunyikan' : 'Lihat') + ' ' + s.peserta + ' koperasi peserta',\n      pesertaList: [\n        { nama: 'KDMP Sumber Makmur', vol: '1.500 kg' },\n        { nama: 'KDMP Sido Rukun', vol: '1.500 kg' },\n        { nama: 'KDMP Tani Jaya', vol: '1.250 kg' }\n      ].concat(s.joined ? [{ nama: 'KDMP Karangmalang (Anda)', vol: '800 kg' }] : [])\n       .concat([{ nama: '9 koperasi lainnya', vol: '—' }]),\n      // beranda\n      totalHemat: done ? 'Rp627.200' : 'Rp0',\n      poolDiikuti: s.joined ? '1' : '0',\n      // form\n      isButuh: s.role === 'butuh', isSuplai: s.role === 'suplai',\n      setButuh: () => this.setState({ role: 'butuh' }),\n      setSuplai: () => this.setState({ role: 'suplai' }),\n      segButuhBg: s.role === 'butuh' ? '#FFFFFF' : 'transparent',\n      segButuhFg: s.role === 'butuh' ? '#C81E1E' : '#5C6570',\n      segSuplaiBg: s.role === 'suplai' ? '#FFFFFF' : 'transparent',\n      segSuplaiFg: s.role === 'suplai' ? '#C81E1E' : '#5C6570',\n      volFieldLabel: s.role === 'butuh' ? 'Volume kebutuhan' : 'Volume tersedia',\n      submitLabel: s.role === 'butuh' ? 'Kirim ke Pool' : 'Kirim penawaran ke Pool',\n      submitForm: () => this.setState({ sheet: true }),\n      sheetOpen: s.sheet,\n      closeSheet: () => this.setState({ sheet: false }),\n      sheetGoPool: () => {\n        this.setState({ sheet: false });\n        this.go('pool');\n        setTimeout(() => this.triggerTier(), 450);\n      },\n      // alokasi\n      hasAlloc: done, noAlloc: !done,\n      // PO doc\n      doPrint: () => window.print(),\n      poRows: [\n        { nama: 'KDMP Karangmalang', nib: '0220110987654', vol: '800 kg', hemat: 'Rp627.200', fee: 'Rp31.360' },\n        { nama: 'KDMP Sumber Makmur', nib: '0220110912345', vol: '1.500 kg', hemat: 'Rp789.000', fee: 'Rp39.450' },\n        { nama: 'KDMP Tani Jaya', nib: '0220110956789', vol: '1.250 kg', hemat: 'Rp845.000', fee: 'Rp42.250' },\n        { nama: 'KDMP Sido Rukun', nib: '0220110934567', vol: '1.500 kg', hemat: 'Rp564.000', fee: 'Rp28.200' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
